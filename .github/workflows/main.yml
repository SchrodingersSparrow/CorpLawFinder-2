# Builds the app's installers on GitHub's servers.
#
# Two jobs:
#   * Windows (.exe) — runs on every upload, and on "Run workflow".
#   * macOS (.dmg, Apple Silicon) — runs ONLY when started by hand via
#     Actions -> "Build Windows installer" -> "Run workflow". Reason: GitHub
#     bills macOS build minutes at 10x — building the dmg on every upload
#     would exhaust the free monthly allowance very quickly.
#
# Finished installers appear under the run's "Artifacts" section.
# Both jobs refuse to package anything unless all tests pass first.

name: Build Windows installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install backend packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller

      - name: Backend tests (must pass to continue)
        run: python -m unittest discover -s backend/tests

      - name: API self-check (advisory — does not block the build)
        continue-on-error: true
        run: python backend/scripts/dev_check.py

      - name: Freeze the backend into a self-contained engine
        run: python backend/scripts/freeze_backend.py

      - name: Install interface packages
        working-directory: frontend
        run: npm install

      - name: Frontend tests (must pass to continue)
        working-directory: frontend
        run: npm test

      - name: Build the installer
        working-directory: frontend
        run: npm run dist -- --publish never

      - name: Offer the Windows installer for download
        uses: actions/upload-artifact@v4
        with:
          name: Legal-Knowledge-Manager-installer
          path: frontend/dist-installer/*.exe
          if-no-files-found: error
          retention-days: 90

  build-mac:
    # Manual-start only — see the cost note at the top of this file.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install backend packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller

      - name: Backend tests (must pass to continue)
        run: python -m unittest discover -s backend/tests

      - name: Freeze the backend into a self-contained engine
        run: python backend/scripts/freeze_backend.py

      - name: Install interface packages
        working-directory: frontend
        run: npm install

      - name: Frontend tests (must pass to continue)
        working-directory: frontend
        run: npm test

      - name: Build the Mac app (.dmg, Apple Silicon)
        working-directory: frontend
        run: npm run dist -- --mac --publish never

      - name: Offer the Mac installer for download
        uses: actions/upload-artifact@v4
        with:
          name: Legal-Knowledge-Manager-installer-mac
          path: frontend/dist-installer/*.dmg
          if-no-files-found: error
          retention-days: 90
